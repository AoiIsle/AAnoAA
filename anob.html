<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今日账单 V2.2 - 设计师版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #FDFBF7;
            --primary: #8BA888; /* 抹茶绿 */
            --accent: #D4A373;  /* 柔和可可 */
            --text-main: #4A4E4D;
            --card-shadow: 0 10px 30px -10px rgba(139, 168, 136, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.01em;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 28px;
            box-shadow: var(--card-shadow);
        }

        .animal-chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: grayscale(0.4) opacity(0.7);
        }

        .animal-chip.active {
            filter: grayscale(0) opacity(1);
            transform: translateY(-4px) scale(1.1);
        }

        .voice-wave {
            display: none;
            gap: 3px;
        }
        .listening .voice-wave { display: flex; }
        .bar { width: 3px; height: 12px; background: white; border-radius: 10px; animation: wave 1s infinite; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 16px; } }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .modal-up { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-up.active { transform: translateY(0); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 pb-2 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-serif italic font-bold text-slate-800">今日账单</h1>
            <input id="tripName" type="text" placeholder="去哪儿玩了？" 
                class="bg-transparent border-none text-sm text-slate-400 focus:ring-0 p-0 mt-1 placeholder-slate-300">
        </div>
        <button onclick="toggleModal('historyModal', true)" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-400">
            <i data-lucide="layout-grid" class="w-5 h-5"></i>
        </button>
    </header>

    <main class="px-5 space-y-6">
        <section class="glass-card p-5 space-y-4">
            <div class="flex items-center space-x-3 bg-slate-50/50 p-2 rounded-2xl">
                <input id="inputItem" type="text" placeholder="买了什么..." class="flex-1 bg-transparent border-none text-sm focus:ring-0">
                <div class="h-4 w-px bg-slate-200"></div>
                <input id="inputAmount" type="number" placeholder="金额" class="w-16 bg-transparent border-none text-sm focus:ring-0 font-bold">
                <select id="inputCurrency" class="bg-transparent border-none text-[10px] font-bold text-slate-400 focus:ring-0 p-0">
                    <option>JPY</option><option>CNY</option><option>USD</option>
                </select>
                <button id="micBtn" onclick="startVoiceRec()" class="w-10 h-10 bg-[#8BA888] text-white rounded-xl flex items-center justify-center transition-all">
                    <i data-lucide="mic" class="w-4 h-4 mic-icon"></i>
                    <div class="voice-wave">
                        <div class="bar" style="animation-delay: 0.1s"></div>
                        <div class="bar" style="animation-delay: 0.3s"></div>
                        <div class="bar" style="animation-delay: 0.2s"></div>
                    </div>
                </button>
            </div>

            <div class="overflow-x-auto no-scrollbar py-2">
                <div id="animalContainer" class="flex space-x-4 min-w-max px-1">
                    </div>
            </div>

            <button onclick="addRecord()" class="w-full py-3.5 bg-slate-800 text-white rounded-2xl text-sm font-bold tracking-widest active:scale-95 transition-transform">
                记录一笔
            </button>
        </section>

        <section id="recordList" class="space-y-3">
            </section>
    </main>

    <div class="fixed bottom-6 right-6 flex flex-col space-y-3">
        <button onclick="copyCurrentSummary()" class="w-14 h-14 bg-white shadow-xl rounded-full flex items-center justify-center text-[#8BA888] border border-slate-100">
            <i data-lucide="share-2"></i>
        </button>
        <button onclick="finishTrip()" class="w-14 h-14 bg-slate-800 shadow-xl rounded-full flex items-center justify-center text-white">
            <i data-lucide="check"></i>
        </button>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-50 hidden">
        <div class="modal-up fixed bottom-0 left-0 right-0 h-[85vh] bg-[#FDFBF7] rounded-t-[40px] shadow-2xl flex flex-col">
            <div class="p-6 flex justify-between items-center">
                <h2 class="text-xl font-bold">旅行簿</h2>
                <button onclick="toggleModal('historyModal', false)" class="text-slate-300"><i data-lucide="x"></i></button>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto px-6 pb-10 space-y-4">
                </div>
        </div>
    </div>

    <div id="manageModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] hidden">
        <div class="modal-up fixed bottom-0 left-0 right-0 h-[70vh] bg-white rounded-t-[40px] flex flex-col p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 id="manageTitle" class="font-bold">账单详情</h3>
                <button onclick="toggleModal('manageModal', false)" class="text-slate-300"><i data-lucide="x"></i></button>
            </div>
            <div id="manageDetailList" class="flex-1 overflow-y-auto space-y-3"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 核心配置
        const EXCHANGE_RATE = 0.048; // JPY -> CNY
        const ANIMALS = ["🧁", "🍩", "🍄", "🥑", "🍋", "🥦", "🥨", "🍭", "🍇", "🥝"]; // 插画风格Emoji
        const ANIMAL_NAMES = ["小粉", "圆圆", "刺刺", "油油", "酸酸", "森森", "结结", "甜甜", "紫紫", "脆脆"];

        let state = {
            currentRecords: [],
            history: JSON.parse(localStorage.getItem('trip_history_v2') || '[]'),
            editingId: null
        };

        // 初始化动物选择
        function initAnimals() {
            const container = document.getElementById('animalContainer');
            ANIMALS.forEach((emoji, i) => {
                container.innerHTML += `
                    <div onclick="toggleAnimal(this)" class="animal-chip flex flex-col items-center space-y-2 cursor-pointer" data-index="${i}">
                        <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-slate-50">${emoji}</div>
                    </div>
                `;
            });
        }

        function toggleAnimal(el) {
            el.classList.toggle('active');
        }

        // 语音听取模拟
        function startVoiceRec() {
            const btn = document.getElementById('micBtn');
            btn.classList.add('listening');
            
            // 模拟长达3秒的识别过程
            setTimeout(() => {
                btn.classList.remove('listening');
                // 模拟结果
                document.getElementById('inputItem').value = "便利店零食";
                document.getElementById('inputAmount').value = "1280";
                document.getElementById('inputCurrency').value = "JPY";
                // 自动选中第1,3个
                document.querySelectorAll('.animal-chip')[0].classList.add('active');
                document.querySelectorAll('.animal-chip')[2].classList.add('active');
            }, 2500);
        }

        // 添加记录
        function addRecord() {
            const item = document.getElementById('inputItem').value;
            const amt = parseFloat(document.getElementById('inputAmount').value);
            const cur = document.getElementById('inputCurrency').value;
            const selected = Array.from(document.querySelectorAll('.animal-chip.active')).map(el => parseInt(el.dataset.index));

            if(!item || !amt) return;

            const rec = {
                id: state.editingId || Date.now(),
                item, amount: amt, currency: cur, 
                animals: selected,
                cny: cur === 'JPY' ? (amt * EXCHANGE_RATE).toFixed(2) : amt.toFixed(2)
            };

            if(state.editingId) {
                state.currentRecords = state.currentRecords.map(r => r.id === state.editingId ? rec : r);
                state.editingId = null;
            } else {
                state.currentRecords.unshift(rec);
            }

            resetInput();
            render();
        }

        function resetInput() {
            document.getElementById('inputItem').value = '';
            document.getElementById('inputAmount').value = '';
            document.querySelectorAll('.animal-chip.active').forEach(el => el.classList.remove('active'));
        }

        function render() {
            const list = document.getElementById('recordList');
            list.innerHTML = '';
            state.currentRecords.forEach(r => {
                list.innerHTML += `
                    <div class="glass-card p-4 flex justify-between items-center">
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-700">${r.item}</h4>
                            <div class="flex space-x-1 mt-1">${r.animals.map(idx => `<span class="text-xs opacity-70">${ANIMALS[idx]}</span>`).join('')}</div>
                        </div>
                        <div class="text-right mr-4">
                            <p class="font-black text-slate-800">${r.amount} <span class="text-[10px] text-slate-400">${r.currency}</span></p>
                            <p class="text-[10px] text-[#8BA888]">≈ ¥${r.cny}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editRec(${r.id})" class="text-slate-300"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                            <button onclick="deleteRec(${r.id})" class="text-slate-300"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function editRec(id) {
            const r = state.currentRecords.find(x => x.id === id);
            document.getElementById('inputItem').value = r.item;
            document.getElementById('inputAmount').value = r.amount;
            state.editingId = id;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteRec(id) {
            state.currentRecords = state.currentRecords.filter(x => x.id !== id);
            render();
        }

        // 汇总复制
        function copyCurrentSummary() {
            if(state.currentRecords.length === 0) return alert("空空的账单无法分享哦");
            
            const trip = document.getElementById('tripName').value || "本次旅行";
            let text = `🌿 【${trip}】结算汇总\n`;
            
            const totals = {};
            state.currentRecords.forEach(r => {
                const share = parseFloat(r.cny) / (r.animals.length + 1);
                r.animals.forEach(idx => {
                    totals[ANIMALS[idx]] = (totals[ANIMALS[idx]] || 0) + share;
                });
            });

            for(let key in totals) text += `${key} 应付: ¥${totals[key].toFixed(2)}\n`;
            
            navigator.clipboard.writeText(text).then(() => alert("汇总已复制到剪贴板！"));
        }

        // 旅行存档
        function finishTrip() {
            const name = document.getElementById('tripName').value || "未命名旅行";
            if(state.currentRecords.length === 0) return;

            const trip = {
                id: Date.now(),
                name: name,
                records: [...state.currentRecords],
                date: new Date().toLocaleDateString()
            };

            state.history.unshift(trip);
            localStorage.setItem('trip_history_v2', JSON.stringify(state.history));
            
            state.currentRecords = [];
            document.getElementById('tripName').value = '';
            render();
            alert("已归档至历史账单");
        }

        // 弹窗管理
        function toggleModal(id, show) {
            const m = document.getElementById(id);
            if(show) {
                m.classList.remove('hidden');
                setTimeout(() => m.querySelector('.modal-up').classList.add('active'), 10);
                if(id === 'historyModal') renderHistory();
            } else {
                m.querySelector('.modal-up').classList.remove('active');
                setTimeout(() => m.classList.add('hidden'), 400);
            }
        }

        // 渲染历史
        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            state.history.forEach(trip => {
                list.innerHTML += `
                    <div class="glass-card p-5 bg-white">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg text-slate-800">${trip.name}</h3>
                                <p class="text-[10px] text-slate-300">${trip.date} · 共${trip.records.length}笔</p>
                            </div>
                            <button onclick="deleteTrip(${trip.id})" class="text-red-200"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <button onclick="manageTripRecords(${trip.id})" class="mt-4 w-full py-2 border border-slate-100 rounded-xl text-xs text-slate-400 font-bold">查看/删除明细</button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function deleteTrip(id) {
            if(confirm("确定永久删除这次旅行记录吗？")) {
                state.history = state.history.filter(t => t.id !== id);
                localStorage.setItem('trip_history_v2', JSON.stringify(state.history));
                renderHistory();
            }
        }

        // 管理历史旅行中的单笔记录
        function manageTripRecords(tripId) {
            const trip = state.history.find(t => t.id === tripId);
            document.getElementById('manageTitle').innerText = trip.name;
            const list = document.getElementById('manageDetailList');
            list.innerHTML = '';
            
            trip.records.forEach(r => {
                list.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-sm">${r.item} (${r.amount}${r.currency})</span>
                        <button onclick="deleteRecordInHistory(${tripId}, ${r.id})" class="text-slate-300"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                `;
            });
            
            toggleModal('manageModal', true);
            lucide.createIcons();
        }

        function deleteRecordInHistory(tripId, recId) {
            const trip = state.history.find(t => t.id === tripId);
            trip.records = trip.records.filter(r => r.id !== recId);
            
            if(trip.records.length === 0) {
                state.history = state.history.filter(t => t.id !== tripId);
                toggleModal('manageModal', false);
            }
            
            localStorage.setItem('trip_history_v2', JSON.stringify(state.history));
            manageTripRecords(tripId);
            renderHistory();
        }

        initAnimals();
        render();
    </script>
</body>
</html>
